<section class="blogs">
  <h1 class="blogs__title">Blogs</h1>
  <app-blogs-filter (queryChange)="onQueryChange($event)" (statusChange)="onStatusChange($event)" />
  @if (loading()) {
    <div class="blogs__spinner">
      <p-progressspinner ariaLabel="Loading blogs" />
    </div>
  } @else {
    <app-blog-grid [blogs]="blogs()" />
  }
</section>
